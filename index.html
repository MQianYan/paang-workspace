<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQianYan - 首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden;
        }
        .bg-animation::before, .bg-animation::after {
            content: ''; position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            border-radius: 50%; animation: float 20s ease-in-out infinite;
        }
        .bg-animation::before { top: -200px; left: -200px; }
        .bg-animation::after { bottom: -200px; right: -200px; animation-delay: -10s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(100px, 100px) scale(1.1); }
            50% { transform: translate(0, 200px) scale(1); }
            75% { transform: translate(-100px, 100px) scale(0.9); }
        }
        .navbar {
            width: 100%; max-width: 1200px; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.5em; font-weight: 300; color: white; text-decoration: none; letter-spacing: 2px; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: rgba(255,255,255,0.9); text-decoration: none; font-size: 0.95em; transition: all 0.3s ease; position: relative; }
        .nav-links a:hover, .nav-links a.active { color: white; }
        .nav-links a.active::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 2px; background: white; }
        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; max-width: 1000px; padding: 40px 20px; margin: 0 auto; }
        .hero { text-align: center; margin-bottom: 50px; }
        .hero h1 { font-size: 3.5em; font-weight: 300; color: white; margin-bottom: 20px; letter-spacing: 5px; }
        .hero p { font-size: 1.2em; color: rgba(255,255,255,0.8); max-width: 600px; margin: 0 auto; line-height: 1.8; }
        .github-stats { display: flex; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
        .stat-card {
            background: rgba(255,255,255,0.15); backdrop-filter: blur(20px);
            border-radius: 15px; padding: 20px 30px; text-align: center;
            border: 1px solid rgba(255,255,255,0.2); min-width: 120px;
        }
        .stat-value { font-size: 2em; font-weight: 600; color: white; }
        .stat-label { font-size: 0.85em; color: rgba(255,255,255,0.7); margin-top: 5px; }
        .quote-card, .weather-card {
            background: rgba(255,255,255,0.15); backdrop-filter: blur(20px);
            border-radius: 20px; padding: 30px; margin: 20px 0; max-width: 600px; width: 100%;
            text-align: center; border: 1px solid rgba(255,255,255,0.2);
        }
        .quote-text { font-size: 1.2em; color: white; font-style: italic; line-height: 1.6; }
        .quote-author { margin-top: 15px; font-size: 0.9em; color: rgba(255,255,255,0.7); }
        .weather-temp { font-size: 3em; font-weight: 300; color: white; }
        .weather-desc { color: rgba(255,255,255,0.7); margin-top: 5px; }
        .weather-location { color: rgba(255,255,255,0.5); font-size: 0.85em; margin-top: 10px; }
        .quick-links { display: flex; gap: 15px; margin-top: 40px; flex-wrap: wrap; justify-content: center; }
        .quick-link {
            padding: 15px 30px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
            border-radius: 25px; color: white; text-decoration: none; font-size: 1em;
            transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.2);
        }
        .quick-link:hover { background: rgba(255,255,255,0.35); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .footer { width: 100%; padding: 40px 20px; text-align: center; color: rgba(255,255,255,0.6); font-size: 0.9em; }
        .footer-links { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .footer-links a { color: rgba(255,255,255,0.7); text-decoration: none; transition: color 0.3s ease; }
        .footer-links a:hover { color: white; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .navbar { padding: 20px; }
            .nav-links { display: none; }
            .hero h1 { font-size: 2.5em; }
            .github-stats { gap: 10px; }
            .stat-card { padding: 15px 20px; min-width: 100px; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <nav class="navbar">
        <a href="index.html" class="logo">MQianYan</a>
        <div class="nav-links">
            <a href="index.html" class="active">首页</a>
            <a href="blog/index.html">博客</a>
            <a href="projects/index.html">项目</a>
            <a href="about/index.html">关于</a>
        </div>
    </nav>
    <main class="main-content">
        <div class="hero">
            <h1>MQianYan</h1>
            <p>热爱技术的开发者 | Minecraft插件作者 | 折腾各种有趣的项目</p>
        </div>
        <div class="github-stats" id="githubStats">
            <div class="stat-card"><div class="stat-value"><span class="loading"></span></div><div class="stat-label">仓库</div></div>
            <div class="stat-card"><div class="stat-value"><span class="loading"></span></div><div class="stat-label">粉丝</div></div>
            <div class="stat-card"><div class="stat-value"><span class="loading"></span></div><div class="stat-label">Star</div></div>
        </div>
        <div class="quote-card" id="quoteCard"><div class="loading" style="margin:20px auto;"></div></div>
        <div class="weather-card" id="weatherCard">
            <div class="weather-temp">--°</div>
            <div class="weather-desc">加载中...</div>
            <div class="weather-location">📍 上海</div>
        </div>
        <div class="quick-links">
            <a href="projects/index.html" class="quick-link">📦 项目下载</a>
            <a href="blog/index.html" class="quick-link">📝 技术博客</a>
            <a href="https://github.com/MQianYan" target="_blank" class="quick-link">📂 GitHub</a>
            <a href="about/index.html" class="quick-link">👤 关于我</a>
        </div>
    </main>
    <footer class="footer">
        <div class="footer-links">
            <a href="https://github.com/MQianYan" target="_blank">GitHub</a>
            <a href="blog/index.html">博客</a>
            <a href="projects/index.html">项目</a>
            <a href="about/index.html">关于</a>
        </div>
        <p>© 2026 MQianYan. Made with ❤️</p>
    </footer>
    <script>
        async function fetchGitHubStats() {
            try {
                const response = await fetch('https://api.github.com/users/MQianYan');
                const data = await response.json();
                const reposResponse = await fetch('https://api.github.com/users/MQianYan/repos?sort=updated&per_page=100');
                const repos = await reposResponse.json();
                const totalStars = repos.reduce((sum, repo) => sum + repo.stargazers_count, 0);
                document.getElementById('githubStats').innerHTML = `
                    <div class="stat-card"><div class="stat-value">${data.public_repos || 0}</div><div class="stat-label">仓库</div></div>
                    <div class="stat-card"><div class="stat-value">${data.followers || 0}</div><div class="stat-label">粉丝</div></div>
                    <div class="stat-card"><div class="stat-value">${totalStars}</div><div class="stat-label">Star</div></div>
                `;
            } catch (error) { console.error('GitHub API Error:', error); }
        }
        async function fetchQuote() {
            try {
                const response = await fetch('https://v1.jinrishici.com/rensheng');
                const data = await response.json();
                document.getElementById('quoteCard').innerHTML = `<div class="quote-text">「${data.content}」</div><div class="quote-author">—— ${data.author}</div>`;
            } catch (error) {
                try {
                    const response = await fetch('https://api.quotable.io/random?tags=wisdom');
                    const data = await response.json();
                    document.getElementById('quoteCard').innerHTML = `<div class="quote-text">"${data.content}"</div><div class="quote-author">—— ${data.author}</div>`;
                } catch (e) {
                    document.getElementById('quoteCard').innerHTML = `<div class="quote-text">"代码是写出来给人读的，顺便给机器执行。"</div><div class="quote-author">—— Hal Abelson</div>`;
                }
            }
        }
        async function fetchWeather() {
            try {
                const response = await fetch('https://wttr.in/Shanghai?format=j1');
                const data = await response.json();
                const current = data.current_condition[0];
                document.getElementById('weatherCard').innerHTML = `
                    <div class="weather-temp">${current.temp_C}°C</div>
                    <div class="weather-desc">${current.weatherDesc[0].value} | 湿度 ${current.humidity}%</div>
                    <div class="weather-location">📍 上海</div>
                `;
            } catch (error) { console.error('Weather API Error:', error); }
        }
        document.addEventListener('DOMContentLoaded', () => { fetchGitHubStats(); fetchQuote(); fetchWeather(); });
    </script>
</body>
</html>
